services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: hackthecrous
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - 4317:4317
      - 16686:16686

volumes:
  postgres_data:
    driver: local

